# Автоматическая загрузка дашбордов из файлов
apiVersion: 1

providers:
  - name: 'FLEX-N-ROLL PRO'
    orgId: 1
    folder: 'FNR'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
