# =============================================================================
# Prometheus — конфигурация для FLEX-N-ROLL PRO
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Правила алертинга (опционально, можно расширить)
rule_files: []
  # - /etc/prometheus/rules/*.yml

scrape_configs:

  # ── Сам Prometheus ─────────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Webhook (fnr-webhook) ──────────────────────────────────────────────────
  - job_name: 'fnr-webhook'
    metrics_path: /metrics
    static_configs:
      - targets: ['fnr-webhook:3000']
        labels:
          service: 'webhook'
          team: 'backend'

  # ── CommAnalysis (fnr-commanalysis) ────────────────────────────────────────
  - job_name: 'fnr-commanalysis'
    metrics_path: /metrics
    static_configs:
      - targets: ['fnr-commanalysis:3000']
        labels:
          service: 'commanalysis'
          team: 'ai'

  # ── Marking (fnr-marking) ─────────────────────────────────────────────────
  - job_name: 'fnr-marking'
    metrics_path: /metrics
    static_configs:
      - targets: ['fnr-marking:3000']
        labels:
          service: 'marking'
          team: 'backend'

  # ── Calculator API (fnr-calculator-api) ────────────────────────────────────
  - job_name: 'fnr-calculator-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['fnr-calculator-api:3001']
        labels:
          service: 'calculator-api'
          team: 'frontend'

  # ── Redis Exporter ─────────────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          team: 'infra'

  # ── Node Exporter (хост-метрики) ───────────────────────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'host'
          team: 'infra'

  # ── cAdvisor (Docker-метрики контейнеров) ──────────────────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          team: 'infra'

  # ── Health-check чёрный ящик (HTTP пробы) ──────────────────────────────────
  - job_name: 'blackbox-health'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://fnr-webhook:3000/health
          - http://fnr-commanalysis:3000/health
          - http://fnr-marking:3000/health
        labels:
          probe: 'health'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
