# Standalone docker-compose для локальной разработки webhook-сервиса.
# Для production используйте корневой docker-compose.yml.
version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fnr-webhook
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - fnr-net

  redis:
    image: redis:7.2-alpine
    container_name: fnr-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fnr-net

volumes:
  redis-data:

networks:
  fnr-net:
    driver: bridge