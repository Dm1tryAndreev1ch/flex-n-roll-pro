# =============================================================================
# FLEX-N-ROLL PRO — Unified Docker Compose
# =============================================================================
# Covers all services: webhook, calculator, commanalysis, fnr-status-bot,
# marking, fnr-analytics, and Redis.
#
# Usage:
#   docker compose up --build -d
#   docker compose logs -f
#   docker compose down
#
# Environment: each service reads from its own .env file.
# Create .env files by copying each service's .env.example.
#
# No host port mappings — all services communicate over the fnr-net
# bridge network using container names and internal ports.
# To expose a service to the host, add: ports: ["HOST:CONTAINER"]
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Redis — cache, rate limiting, round-robin counters (used by webhook)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: fnr-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fnr-net

  # ---------------------------------------------------------------------------
  # Webhook — Bitrix24 x LM Studio AI webhook handler
  # Receives CRM events, classifies with local AI, routes to managers
  # Internal port: 3000 (reachable as http://fnr-webhook:3000 within fnr-net)
  # ---------------------------------------------------------------------------
  webhook:
    build:
      context: ./webhook
      dockerfile: Dockerfile
    container_name: fnr-webhook
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./webhook/.env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    volumes:
      - webhook-logs:/app/logs
      - webhook-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - fnr-net

  # ---------------------------------------------------------------------------
  # Calculator — label pricing calculator (React SPA + Express API)
  # Frontend served by nginx on port 80 (reachable as http://fnr-calculator within fnr-net)
  # Note: Docker build produces the static frontend only (nginx).
  #       For full functionality, run the calculator-api service below.
  # ---------------------------------------------------------------------------
  calculator:
    build:
      context: ./calculator
      dockerfile: Dockerfile
    container_name: fnr-calculator
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - fnr-net

  # ---------------------------------------------------------------------------
  # Calculator API — Express backend for the calculator
  # Provides /api endpoints for Bitrix24 integration
  # Internal port: 3001 (reachable as http://fnr-calculator-api:3001 within fnr-net)
  # ---------------------------------------------------------------------------
  calculator-api:
    build:
      context: ./calculator
      dockerfile: Dockerfile.api
    container_name: fnr-calculator-api
    restart: unless-stopped
    expose:
      - "3001"
    env_file:
      - ./calculator/.env
    environment:
      NODE_ENV: production
      PORT: 3001
    networks:
      - fnr-net

  # ---------------------------------------------------------------------------
  # CommAnalysis — AI analysis of sales communications
  # Transcribes calls via Whisper, evaluates via GPT, generates reports
  # Internal port: 3000 (reachable as http://fnr-commanalysis:3000 within fnr-net)
  # ---------------------------------------------------------------------------
  commanalysis:
    build:
      context: ./commanalysis
      dockerfile: Dockerfile
    container_name: fnr-commanalysis
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./commanalysis/.env
    environment:
      NODE_ENV: production
      TMP_DIR: /tmp/commanalysis
    volumes:
      - commanalysis-logs:/app/logs
      - commanalysis-tmp:/tmp/commanalysis
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - fnr-net

  # ---------------------------------------------------------------------------
  # FNR Status Bot — Telegram bot for order status checking
  # Long-polling bot, no HTTP port exposed
  # ---------------------------------------------------------------------------
  fnr-status-bot:
    build:
      context: ./fnr-status-bot
      dockerfile: Dockerfile
    container_name: fnr-status-bot
    restart: unless-stopped
    env_file:
      - ./fnr-status-bot/.env
    depends_on:
      webhook:
        condition: service_healthy
    networks:
      - fnr-net

  # ---------------------------------------------------------------------------
  # Marking — Honest Sign (Честный ЗНАК) integration module
  # Manages product marking codes, generates QR codes, syncs with CRM
  # Internal port: 3000 (reachable as http://fnr-marking:3000 within fnr-net)
  # ---------------------------------------------------------------------------
  marking:
    build:
      context: ./marking
      dockerfile: Dockerfile
    container_name: fnr-marking
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./marking/.env
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      PRODUCTION_DIR: /app/data/production/orders
      CODES_DB_PATH: /app/data/codes_db.json
    volumes:
      - marking-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - fnr-net

  # ---------------------------------------------------------------------------
  # FNR Analytics — analytics dashboard (static React SPA)
  # Built with Vite + vite-plugin-singlefile, served by nginx
  # Internal port: 80 (reachable as http://fnr-analytics within fnr-net)
  # ---------------------------------------------------------------------------
  fnr-analytics:
    build:
      context: ./fnr-analytics
      dockerfile: Dockerfile
    container_name: fnr-analytics
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - fnr-net

# =============================================================================
# Volumes — persistent data storage
# =============================================================================
volumes:
  redis-data:
    driver: local
  webhook-logs:
    driver: local
  webhook-data:
    driver: local
  commanalysis-logs:
    driver: local
  commanalysis-tmp:
    driver: local
  marking-data:
    driver: local

# =============================================================================
# Networks — all services communicate on a shared bridge network
# =============================================================================
networks:
  fnr-net:
    driver: bridge
